<div class="section-hdr" style="padding-top:0">Display Options</div>
<div class="two-col">
  <div class="field-row">
    <label class="field-label">Row Stripes</label>
    <div class="toggle-row">
      <div class="toggle-wrap" (click)="upd('striped', !cfg.striped)">
        <div class="toggle-box" [class.is-on]="cfg.striped"></div>
        <span class="toggle-label">Alternating rows</span>
      </div>
    </div>
  </div>
  <div class="field-row">
    <label class="field-label">Compact Mode</label>
    <div class="toggle-row">
      <div class="toggle-wrap" (click)="upd('compact', !cfg.compact)">
        <div class="toggle-box" [class.is-on]="cfg.compact"></div>
        <span class="toggle-label">Dense layout</span>
      </div>
    </div>
  </div>
  <div class="field-row">
    <label class="field-label">Status Column</label>
    <div class="toggle-row">
      <div class="toggle-wrap" (click)="upd('statusColumn', !cfg.statusColumn)">
        <div class="toggle-box" [class.is-on]="cfg.statusColumn"></div>
        <span class="toggle-label">Auto-color status</span>
      </div>
    </div>
  </div>
</div>

@if (cfg.statusColumn) {
  <div class="status-hint">
    <div class="status-hint-label">AUTO-COLORED STATUS VALUES</div>
    <div class="status-chips">
      @for (entry of statusEntries; track entry[0]) {
        <span class="status-chip" [style.background]="entry[1].bg" [style.color]="entry[1].fg">
          {{ entry[0] }}
        </span>
      }
    </div>
  </div>
}
