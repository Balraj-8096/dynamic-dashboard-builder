<!-- ═══════════════════════════════════════════════════════════
     Bar Chart Widget
     ═══════════════════════════════════════════════════════════ -->

<!-- Loading rail (re-queries with existing chart) -->
@if (isLoading && chartOptions) {
  <div class="wld-rail" aria-hidden="true"></div>
}

@if (cfg.queryConfig?.dateRangeField; as drf) {
  <div class="widget-date-toolbar">
    <app-widget-date-picker
      [entity]="drf.entity"
      [field]="drf.field"
      [preset]="localDatePreset"
      (presetChange)="onDateChange($event)">
    </app-widget-date-picker>
  </div>
}

@if (isLoading && !chartOptions) {
  <!-- Spinner: initial load, no chart data yet -->
  <div class="wld-center-spinner" role="status" aria-label="Loading chart data">
    <div class="wld-center-spinner__ring"></div>
  </div>
} @else if (chartOptions && chartOptions.series.length) {
  <div class="chart-container" [class.chart-container--loading]="isLoading">
    <apx-chart
      [series]="chartOptions.series"
      [chart]="chartOptions.chart"
      [xaxis]="chartOptions.xaxis"
      [yaxis]="chartOptions.yaxis"
      [dataLabels]="chartOptions.dataLabels"
      [grid]="chartOptions.grid"
      [legend]="chartOptions.legend"
      [tooltip]="chartOptions.tooltip"
      [plotOptions]="chartOptions.plotOptions"
      [stroke]="chartOptions.stroke"
      [fill]="chartOptions.fill"
      [colors]="chartOptions.colors"
      [annotations]="chartOptions.annotations">
    </apx-chart>
  </div>
} @else {
  <div class="chart-empty">
    <span>No data</span>
  </div>
}
