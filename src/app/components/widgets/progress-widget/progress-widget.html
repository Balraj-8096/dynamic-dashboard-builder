@if (cfg) {
  <div class="progress-layout" [class.progress-layout--loading]="isLoading">

    <!-- Loading rail -->
    @if (isLoading) {
      <div class="wld-rail" aria-hidden="true"></div>
    }

    @for (item of items; track item.label) {
      <div class="progress-item">

        <!-- Label row -->
        <div class="progress-item__header">
          <span class="progress-item__label">
            {{ item.label }}
          </span>
          @if (cfg.showValues) {
            <span
              class="progress-item__value"
              [style.color]="resolveItemColor(item)">
              {{ getPercent(item) }}%
            </span>
          }
        </div>

        <!-- Track -->
        <div class="progress-track">
          <div
            class="progress-fill"
            [style.width.%]="getPercent(item)"
            [style.background]="resolveItemColor(item)"
            [style.box-shadow]="'0 0 6px ' + resolveItemColor(item) + '66'">
          </div>
        </div>

      </div>
    }

  </div>
}
