<div class="section-hdr" style="padding-top:0">Display Options</div>
<div class="two-col">
  <div class="field-row">
    <label class="field-label">Prefix (e.g. $)</label>
    <input class="inp" [value]="cfg.prefix || ''" (input)="upd('prefix', $any($event.target).value)" />
  </div>
  <div class="field-row">
    <label class="field-label">Suffix (e.g. %)</label>
    <input class="inp" [value]="cfg.suffix || ''" (input)="upd('suffix', $any($event.target).value)" />
  </div>
  <div class="field-row">
    <label class="field-label">Accent Color</label>
    <input type="color" class="inp" [value]="cfg.accent || '#3b82f6'" (input)="upd('accent', $any($event.target).value)" />
  </div>
  <div class="field-row">
    <label class="field-label">Show Sparkline</label>
    <div class="toggle-row">
      <div class="toggle-wrap" (click)="upd('showSparkline', !cfg.showSparkline)">
        <div class="toggle-box" [class.is-on]="cfg.showSparkline"></div>
        <span class="toggle-label">Enabled</span>
      </div>
    </div>
  </div>
</div>
<div class="field-row">
  <label class="field-label">Description</label>
  <input class="inp" [value]="cfg.description || ''" (input)="upd('description', $any($event.target).value)" />
</div>
