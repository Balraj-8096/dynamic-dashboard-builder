@if (cfg && cols.length) {
  <div
    class="table-wrapper"
    [class.table--compact]="cfg.compact"
    [style.max-height.px]="contentH">

    <table
      mat-table
      [dataSource]="rows"
      class="widget-table">

      <!-- Dynamic columns -->
      @for (col of cols; track col.key) {
        <ng-container [matColumnDef]="col.key">

          <!-- Header -->
          <th mat-header-cell *matHeaderCellDef>
            {{ col.label }}
          </th>

          <!-- Cell -->
          <td mat-cell *matCellDef="let row">

            @if (isStatusCol(col)) {
              <!-- Status badge -->
              <span
                class="status-badge"
                [style.background]="getStatusStyle(getCellValue(row, col.key)).bg"
                [style.color]="getStatusStyle(getCellValue(row, col.key)).fg">
                <span
                  class="status-dot"
                  [style.background]="getStatusStyle(getCellValue(row, col.key)).fg">
                </span>
                {{ getStatusStyle(getCellValue(row, col.key)).label }}
              </span>
            } @else {
              {{ getCellValue(row, col.key) }}
            }

          </td>

        </ng-container>
      }

      <!-- Header + rows -->
      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns; sticky: true">
      </tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns;"
        [class.row--striped]="cfg.striped">
      </tr>

    </table>

  </div>
} @else {
  <div class="table-empty">
    <span>No columns configured</span>
  </div>
}
