<header class="toolbar" [class.is-compact]="svc.compactViewport()">

  <!-- ── LEFT CLUSTER ─────────────────────────────────────────── -->
  <div class="cluster cluster--left">

    @if (svc.compactViewport()) {
      <button class="btn-icon btn-sidebar-toggle" title="Open widget tools" (click)="toggleSidebar()">
        Menu
      </button>
    }

    <!-- Logo -->
    <div class="logo">
      <span class="logo-diamond">◈</span>
      <span class="logo-dash"> dash</span><span class="logo-craft">craft</span>
    </div>

    <div class="vdivider desktop-only"></div>

    <!-- Dashboard title (editable) -->
    @if (svc.editingTitle()) {
      <input
        #titleInput
        class="title-input"
        type="text"
        [value]="svc.dashTitle()"
        (blur)="onTitleBlur($any($event.target).value)"
        (keydown)="onTitleKeyDown($event, $any($event.target).value)"
      />
    } @else {
      <span class="title-span" title="Click to rename" (click)="startEditTitle()">
        {{ svc.dashTitle() }} ✏
      </span>
    }

    <span class="widget-count">{{ widgetCount }} widget{{ widgetCount !== 1 ? 's' : '' }}</span>
  </div>

  <!-- ── CENTER CLUSTER ────────────────────────────────────────── -->
  <div class="cluster cluster--center">

    <!-- Add Widget -->
    <button class="btn-add" (click)="openWizard()" title="Add a new widget">
      + Add Widget
    </button>

    <div class="vdivider"></div>

    <!-- Undo -->
    <button
      class="btn-icon"
      title="Undo (Ctrl+Z)"
      [disabled]="!svc.canUndo()"
      (click)="svc.undo()"
    >↩</button>

    <!-- Redo -->
    <button
      class="btn-icon"
      title="Redo (Ctrl+Y)"
      [disabled]="!svc.canRedo()"
      (click)="svc.redo()"
    >↪</button>

    <div class="vdivider"></div>

    <!-- Pack -->
    <button class="btn-text btn-text--green desktop-only" title="Auto-arrange: collapse empty rows" (click)="svc.applyPackLayout()">
      ⊕ pack
    </button>

    <!-- Clear -->
    <button class="btn-text btn-text--red desktop-only" title="Clear all widgets" (click)="svc.clearAll()">
      ✕ clear
    </button>
  </div>

  <!-- ── RIGHT CLUSTER ─────────────────────────────────────────── -->
  <div class="cluster cluster--right">

    <!-- Zoom controls -->
    <div class="zoom-group">
      <button class="zoom-btn" title="Zoom out (Ctrl+scroll)" (click)="svc.zoomOut()">−</button>
      <button
        class="zoom-pct"
        title="Reset zoom to 100%"
        [class.is-non-default]="!svc.isDefaultZoom()"
        (click)="svc.resetZoom()"
      >{{ svc.zoomPercent() }}</button>
      <button class="zoom-btn" title="Zoom in (Ctrl+scroll)" (click)="svc.zoomIn()">+</button>
    </div>

    <div class="vdivider"></div>

    <div class="utility-group desktop-only">
    <!-- Import -->
    <button class="btn-text btn-text--utility" title="Import JSON layout" (click)="svc.openImport()">
      ⬆ import
    </button>

    <!-- Export -->
    <button class="btn-text btn-text--utility" title="Export layout as JSON" (click)="svc.exportLayout()">
      ⬇ export
    </button>

    <!-- Help -->
    <button class="btn-icon" title="How to use (help)" (click)="svc.openHelp()">?</button>

    <!-- Theme toggle -->
    <button
      class="btn-icon btn-theme"
      [title]="themeSvc.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="themeSvc.toggle()"
    >{{ themeSvc.theme() === 'dark' ? '☀' : '☾' }}</button>

    </div>

    <!-- View Dashboard -->
    <button
      class="btn-view"
      title="Preview the dashboard in view-only mode"
      [disabled]="svc.widgetCount() === 0"
      (click)="goToView()"
    >
      ▶ View
    </button>
    @if (svc.compactViewport()) {
      <button class="btn-icon btn-overflow" title="More actions" (click)="toggleToolbarMenu()">
        More
      </button>
    }
  </div>

  @if (svc.compactViewport() && svc.toolbarMenuOpen()) {
    <div class="toolbar-menu">
      <button class="toolbar-menu__item" (click)="runPackLayout()">Pack Layout</button>
      <button class="toolbar-menu__item toolbar-menu__item--danger" (click)="clearAll()">Clear All</button>
      <button class="toolbar-menu__item" (click)="openImport()">Import Layout</button>
      <button class="toolbar-menu__item" (click)="exportLayout()">Export Layout</button>
      <button class="toolbar-menu__item" (click)="openHelp()">Help</button>
      <button class="toolbar-menu__item" (click)="toggleTheme()">
        {{ themeSvc.theme() === 'dark' ? 'Light Mode' : 'Dark Mode' }}
      </button>
    </div>
  }

</header>
