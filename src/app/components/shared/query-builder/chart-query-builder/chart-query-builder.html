<!-- Primary Entity -->
<div class="section-hdr" style="padding-top:0">Primary Entity</div>
<div class="field-row" style="margin-bottom:12px">
  <label class="field-label">Entity</label>
  <select class="sel"
    [(ngModel)]="primaryEntity"
    (ngModelChange)="onPrimaryEntityChange($event)">
    @for (e of entities; track e.name) {
      <option [value]="e.name">{{ e.name }}</option>
    }
  </select>
</div>

<!-- Date Axis -->
<div class="section-hdr">Date Axis</div>
<div class="toggle-row" style="margin-bottom:10px">
  <label class="toggle-wrap" (click)="onDateAxisToggle()">
    <div class="toggle-box" [class.is-on]="dateAxisEnabled"></div>
    <span class="toggle-label">Group x-axis by date/time field</span>
  </label>
</div>

@if (dateAxisEnabled) {
  <div class="three-col">
    <div class="field-row">
      <label class="field-label">Entity</label>
      <select class="sel sel--sm"
        [(ngModel)]="dateAxisEntity"
        (ngModelChange)="onDateAxisEntityChange($event)">
        @for (e of reachableEntities; track e.name) {
          <option [value]="e.name">{{ e.name }}</option>
        }
      </select>
    </div>
    <div class="field-row">
      <label class="field-label">Date Field</label>
      <select class="sel sel--sm"
        [(ngModel)]="dateAxisField"
        (ngModelChange)="emit()">
        @for (f of dateFields(dateAxisEntity); track f.name) {
          <option [value]="f.name">{{ f.name }}</option>
        }
      </select>
    </div>
    <div class="field-row">
      <label class="field-label">Interval</label>
      <select class="sel sel--sm"
        [(ngModel)]="dateAxisInterval"
        (ngModelChange)="emit()">
        @for (i of dateIntervals(); track i) {
          <option [value]="i">{{ i }}</option>
        }
      </select>
    </div>
  </div>
}

<!-- Value Aggregation -->
<div class="section-hdr">Value Aggregation</div>
<div class="three-col">
  <div class="field-row">
    <label class="field-label">Entity</label>
    <select class="sel sel--sm"
      [(ngModel)]="valueAggEntity"
      (ngModelChange)="onValueAggEntityChange($event)">
      @for (e of valueAggEntities; track e.name) {
        <option [value]="e.name">{{ e.name }}</option>
      }
    </select>
  </div>
  <div class="field-row">
    <label class="field-label">Field</label>
    <select class="sel sel--sm"
      [(ngModel)]="valueAggField"
      (ngModelChange)="emit()">
      @for (f of aggFields(valueAggEntity); track f.name) {
        <option [value]="f.name">{{ f.name }}</option>
      }
    </select>
  </div>
  <div class="field-row">
    <label class="field-label">Function</label>
    <select class="sel sel--sm"
      [(ngModel)]="valueAggFunction"
      (ngModelChange)="emit()">
      @for (fn of aggFunctions(); track fn) {
        <option [value]="fn">{{ fn }}</option>
      }
    </select>
  </div>
</div>

<!-- Group By -->
<div class="section-hdr">Group By (Series Split)</div>
<div class="toggle-row" style="margin-bottom:10px">
  <label class="toggle-wrap" (click)="groupByEnabled = !groupByEnabled; emit()">
    <div class="toggle-box" [class.is-on]="groupByEnabled"></div>
    <span class="toggle-label">Split into multiple series by field</span>
  </label>
</div>

@if (groupByEnabled) {
  <div class="two-col" style="margin-bottom:12px">
    <div class="field-row">
      <label class="field-label">Entity</label>
      <select class="sel sel--sm"
        [(ngModel)]="groupByEntity"
        (ngModelChange)="onGroupByEntityChange($event)">
        @for (e of reachableEntities; track e.name) {
          <option [value]="e.name">{{ e.name }}</option>
        }
      </select>
    </div>
    <div class="field-row">
      <label class="field-label">Field</label>
      <select class="sel sel--sm"
        [(ngModel)]="groupByField"
        (ngModelChange)="emit()">
        @for (f of fieldsFor(groupByEntity); track f.name) {
          <option [value]="f.name">{{ f.name }}</option>
        }
      </select>
    </div>
  </div>
}

<!-- Filters -->
<app-filter-builder
  [product]="product"
  [entityScope]="filterScope"
  [filterGroups]="filterGroups"
  (filterGroupsChange)="filterGroups = $event; emit()" />
