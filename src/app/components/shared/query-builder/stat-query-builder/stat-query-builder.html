<!-- Primary Entity -->
<div class="section-hdr" style="padding-top:0">Primary Entity</div>
<div class="field-row" style="margin-bottom:12px">
  <label class="field-label">Entity</label>
  <select class="sel"
    [(ngModel)]="primaryEntity"
    (ngModelChange)="onPrimaryEntityChange($event)">
    @for (e of entities; track e.name) {
      <option [value]="e.name">{{ e.name }}</option>
    }
  </select>
</div>

<!-- Aggregation -->
<div class="section-hdr">Aggregation</div>
<div class="three-col">
  <div class="field-row">
    <label class="field-label">Entity</label>
    <select class="sel sel--sm"
      [(ngModel)]="aggEntity"
      (ngModelChange)="onAggEntityChange($event)">
      @for (e of aggEntities; track e.name) {
        <option [value]="e.name">{{ e.name }}</option>
      }
    </select>
  </div>
  <div class="field-row">
    <label class="field-label">Function</label>
    <select class="sel sel--sm"
      [(ngModel)]="aggFunction"
      (ngModelChange)="emit()">
      @for (fn of aggFunctions(); track fn) {
        <option [value]="fn">{{ fn }}</option>
      }
    </select>
  </div>
  @if (aggFunction !== AggregationFunction.Count) {
    <div class="field-row">
      <label class="field-label">Field</label>
      <select class="sel sel--sm"
        [(ngModel)]="aggField"
        (ngModelChange)="emit()">
        @for (f of aggFields(aggEntity); track f.name) {
          <option [value]="f.name">{{ f.name }}</option>
        }
      </select>
    </div>
  }
</div>

<!-- Trend -->
<div class="section-hdr">Trend Comparison</div>
<div class="toggle-row" style="margin-bottom:10px">
  <label class="toggle-wrap" (click)="trendEnabled = !trendEnabled; emit()">
    <div class="toggle-box" [class.is-on]="trendEnabled"></div>
    <span class="toggle-label">Compare to previous period</span>
  </label>
</div>

@if (trendEnabled) {
  <div class="three-col" style="margin-bottom:6px">
    <div class="field-row">
      <label class="field-label">Entity</label>
      <select class="sel sel--sm"
        [(ngModel)]="trendEntity"
        (ngModelChange)="onTrendEntityChange($event)">
        @for (e of trendEntities; track e.name) {
          <option [value]="e.name">{{ e.name }}</option>
        }
      </select>
    </div>
    <div class="field-row">
      <label class="field-label">Date Field</label>
      <select class="sel sel--sm"
        [(ngModel)]="trendField"
        (ngModelChange)="emit()">
        @for (f of dateFields(trendEntity); track f.name) {
          <option [value]="f.name">{{ f.name }}</option>
        }
      </select>
    </div>
    <div class="field-row">
      <label class="field-label">Interval</label>
      <select class="sel sel--sm"
        [(ngModel)]="trendInterval"
        (ngModelChange)="emit()">
        @for (i of dateIntervals(); track i) {
          <option [value]="i">{{ i }}</option>
        }
      </select>
    </div>
  </div>
  <div class="field-row" style="margin-bottom:12px">
    <label class="field-label">Periods back</label>
    <input class="inp inp--sm inp--w64" type="number" min="1" max="12"
      [(ngModel)]="trendPeriods" (ngModelChange)="emit()" />
  </div>
}

<!-- Filters -->
<app-filter-builder
  [product]="product"
  [entityScope]="filterScope"
  [filterGroups]="filterGroups"
  (filterGroupsChange)="filterGroups = $event; emit()" />

<!-- Period Label -->
<div class="section-hdr">Period Label</div>
<div class="field-row" [style.margin-bottom]="periodLabelPreset === '_custom' ? '6px' : '12px'">
  <label class="field-label">Preset</label>
  <select class="sel"
    [(ngModel)]="periodLabelPreset"
    (ngModelChange)="onPeriodLabelPresetChange($event)">
    @for (opt of periodLabelOptions; track opt.value) {
      <option [value]="opt.value">{{ opt.label }}</option>
    }
  </select>
</div>
@if (periodLabelPreset === '_custom') {
  <div class="field-row" style="margin-bottom:12px">
    <label class="field-label" for="period-label-custom">Custom</label>
    <input id="period-label-custom" class="inp"
      [value]="periodLabel"
      placeholder="e.g. Q1 2026"
      (input)="periodLabel = $any($event.target).value; emit()" />
  </div>
}
